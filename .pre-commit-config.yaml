minimum_pre_commit_version: "4.0.0"

default_install_hook_types:
  - pre-commit

repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint (changed Go code vs HEAD)
        entry: go
        args:
          - tool
          - -modfile=golangci-lint.mod
          - golangci-lint
          - run
          - --new-from-rev=HEAD
        language: system
        pass_filenames: false
        require_serial: true
        types: [go]
